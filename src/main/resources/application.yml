server:
  port: 8082

spring:
  application:
    name: autoshop-auth
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-env-change-me-in-env-123456}
      access-ttl: 15m
      refresh-ttl: 7d
