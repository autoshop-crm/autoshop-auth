databaseChangeLog:
  - changeSet:
      id: 007-add-customer-auth-columns
      author: codex
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: email_verified
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: account_status
                  type: VARCHAR(32)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
  - changeSet:
      id: 008-create-customer-action-tokens
      author: codex
      changes:
        - createTable:
            tableName: customer_action_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_customer_action_tokens
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: used
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: customer_action_tokens
            columnNames: token
            constraintName: uk_customer_action_tokens_token
        - addForeignKeyConstraint:
            baseTableName: customer_action_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_customer_action_tokens_user
            onDelete: CASCADE
        - createIndex:
            tableName: customer_action_tokens
            indexName: idx_customer_action_tokens_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: customer_action_tokens
            indexName: idx_customer_action_tokens_token
            columns:
              - column:
                  name: token
